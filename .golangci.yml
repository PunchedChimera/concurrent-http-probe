# golangci-lint configuration.
# Full reference: https://golangci-lint.run/usage/linters/
version: "2"

linters:
  enable:
    - errcheck      # checks that errors are handled
    - govet         # go vet — catches real bugs
    - staticcheck   # SA rules: many real-world bugs
    - gosimple      # suggests simpler code
    - unused        # finds unused code
    - gofmt         # enforces standard formatting
    - goimports     # enforces import grouping
    - misspell      # catches common typos
    - godot         # ensures comments end with a period
    - exhaustive    # ensures switch on enums covers all cases

linters-settings:
  gofmt:
    simplify: true
  govet:
    enable-all: true
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-rules:
    # Test files don't need exhaustive error handling for test helpers.
    - path: "_test.go"
      linters: [errcheck]
