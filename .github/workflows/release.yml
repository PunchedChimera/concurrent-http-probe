# Release workflow: triggered when a version tag is pushed (e.g. v1.0.0).
# GoReleaser builds cross-platform binaries and creates a GitHub Release automatically.
# Free for public repos, no registration needed beyond installing the action.
name: Release

on:
  push:
    tags:
      - "v*.*.*" # matches v1.0.0, v2.3.1, etc.

permissions:
  contents: write # required to create GitHub Releases

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full git history for changelog generation

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # GITHUB_TOKEN is provided automatically by Actions — no secrets needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
